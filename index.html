<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burari Batch-A Roster</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161820;
    --card: #1e2029;
    --border: #2a2d3a;
    --accent: #e8ff47;
    --accent2: #47c2ff;
    --text: #e8eaf0;
    --muted: #6b6f82;
    --holiday: #1a2a1a;
    --holiday-text: #4caf6e;
    --scrubs: #2a1a10;
    --scrubs-text: #ff9d4a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  .header { margin-bottom: 48px; }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .eyebrow::before {
    content: '';
    width: 24px;
    height: 2px;
    background: var(--accent);
    display: inline-block;
  }
  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  h1 span { color: var(--accent); }
  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 400;
  }

  /* Search inputs */
  .search-section {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    align-items: stretch;
  }
  .input-wrap {
    flex: 1;
    position: relative;
  }
  .input-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    position: absolute;
    top: 12px;
    left: 16px;
    pointer-events: none;
  }
  input[type="number"], input[type="date"] {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 28px 16px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
    color-scheme: dark;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus, input[type="date"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,255,71,0.08);
  }
  .search-btn {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    padding: 0 28px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .search-btn:hover { background: #d4eb20; transform: translateY(-1px); }
  .search-btn:active { transform: translateY(0); }

  .date-row {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    align-items: stretch;
  }
  .date-row .input-wrap { flex: 2; }
  .clear-btn {
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0 18px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Filter tabs */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f14;
    font-weight: 700;
  }
  .filter-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  .history-btn {
    background: var(--card);
    border: 1.5px dashed var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    margin-left: auto;
  }
  .history-btn.active {
    background: transparent;
    border-color: var(--muted);
    color: var(--text);
  }
  .history-btn:hover { border-color: var(--text); color: var(--text); }

  /* Single day result */
  .single-day-result {
    margin-bottom: 32px;
    display: none;
  }
  .single-day-result.visible { display: block; }
  .single-day-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Schedule grid */
  #results { display: none; }
  #results.visible { display: block; }

  .intern-name-header {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 20px;
    letter-spacing: -0.02em;
  }

  .month-group { margin-bottom: 32px; }
  .month-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 8px;
  }

  .day-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s, transform 0.15s;
    animation: fadeIn 0.25s ease both;
  }
  .day-card-main {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .day-card:hover { transform: translateY(-1px); }
  .day-card.today {
    border-color: var(--accent);
    background: #1a1e10;
  }
  .day-card.holiday {
    background: var(--holiday);
    border-color: rgba(76,175,110,0.2);
  }
  .day-card.hidden { display: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .date-block { min-width: 44px; text-align: center; }
  .date-day {
    font-family: 'Space Mono', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .date-weekday {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .day-card.today .date-day { color: var(--accent); }

  .divider {
    width: 1px;
    height: 36px;
    background: var(--border);
    flex-shrink: 0;
  }

  .dept-info { flex: 1; min-width: 0; }
  .dept-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .dept-type {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
  }
  .holiday-text {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--holiday-text);
  }

  .today-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    background: var(--accent);
    color: #0d0f14;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.1em;
    flex-shrink: 0;
  }

  /* Scrubs reminder */
  .scrubs-reminder {
    background: var(--scrubs);
    border: 1px solid rgba(255,157,74,0.3);
    border-radius: 6px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--scrubs-text);
    letter-spacing: 0.02em;
  }
  .scrubs-icon { font-size: 0.9rem; flex-shrink: 0; }

  .partner-tag { color: #b47aff; }

  /* Partner interns (Casualty ↔ Surgery night) */
  .partnerinterns {
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(180, 120, 255, 0.06);
    border: 1px dashed rgba(180, 120, 255, 0.35);
    border-radius: 6px;
    font-size: 0.76rem;
    color: #b47aff;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.04em;
  }
  .partnerinterns-label {
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  /* Cab pool */
  .cabpool {
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(255, 157, 74, 0.06);
    border: 1px solid rgba(255, 157, 74, 0.2);
    border-radius: 6px;
    font-size: 0.76rem;
    color: var(--scrubs-text);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.04em;
  }
  .cabpool-label {
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  /* Co-interns */
  .cointerns {
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(71,194,255,0.06);
    border: 1px solid rgba(71,194,255,0.18);
    border-radius: 6px;
    font-size: 0.76rem;
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.04em;
  }
  .cointerns-legend {
    margin-top: 5px;
    font-size: 0.65rem;
    color: #b47aff;
    letter-spacing: 0.05em;
    opacity: 0.8;
  }
  .cointerns-label {
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  /* Empty / error / placeholder */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .big-num {
    font-family: 'Space Mono', monospace;
    font-size: 4rem;
    color: var(--border);
    margin-bottom: 16px;
  }
  .placeholder {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .placeholder-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
  .placeholder p { font-size: 0.9rem; line-height: 1.6; }

  @media (max-width: 500px) {
    .search-section, .date-row { flex-direction: column; }
    .search-btn, .clear-btn { padding: 14px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="eyebrow">Burari Hospital · Batch A</div>
    <h1>Your <span>Schedule</span></h1>
    <p class="subtitle">13-week schedule · May – Aug 2026</p>
  </div>

  <div class="search-section">
    <div class="input-wrap">
      <span class="input-label">Serial No.</span>
      <input type="number" id="serialInput" min="1" max="58" placeholder="01" />
    </div>
    <button class="search-btn" onclick="lookupSerial()">View Schedule →</button>
  </div>

  <div class="date-row">
    <div class="input-wrap">
      <span class="input-label">Jump to Date</span>
      <input type="date" id="dateInput" min="2026-05-23" max="2026-08-21" />
    </div>
    <button class="clear-btn" onclick="clearDate()">Clear Date</button>
  </div>

  <div class="filters" id="filters" style="display:none">
    <button class="filter-btn active" onclick="setFilter('all', this)">All Days</button>
    <button class="filter-btn" onclick="setFilter('duty', this)">Duty Only</button>
    <button class="filter-btn" onclick="setFilter('holiday', this)">Holidays</button>
    <button class="history-btn" id="historyBtn" onclick="toggleHistory()">Show Past</button>
  </div>

  <div class="single-day-result" id="singleDayResult"></div>

  <div id="placeholder" class="placeholder">
    <div class="placeholder-icon">🏥</div>
    <p>Enter your serial number above<br>to view your complete schedule</p>
  </div>

  <div id="results"></div>
</div>

// Precompute: for each (date, dept) -> sorted list of all serials posted there
const CO_INTERNS = {};
Object.entries(SCHEDULE).forEach(([serial, entries]) => {
  entries.forEach(([date, dept]) => {
    if (!dept) return;
    const key = date + '|' + dept;
    if (!CO_INTERNS[key]) CO_INTERNS[key] = [];
    CO_INTERNS[key].push(Number(serial));
  });
});
Object.values(CO_INTERNS).forEach(arr => arr.sort((a,b) => a-b));

// Casualty Night <-> Surgery Night cross-posting lookup: date -> {casualty: [serials], surgery: [serials]}
const CROSS_NIGHT = {};
Object.entries(SCHEDULE).forEach(([serial, entries]) => {
  entries.forEach(([date, dept]) => {
    if (!dept) return;
    if (dept === 'Casualty Night' || dept === 'Surgery (Night)') {
      if (!CROSS_NIGHT[date]) CROSS_NIGHT[date] = { casualty: [], surgery: [] };
      if (dept === 'Casualty Night') CROSS_NIGHT[date].casualty.push(Number(serial));
      else CROSS_NIGHT[date].surgery.push(Number(serial));
    }
  });
});
Object.values(CROSS_NIGHT).forEach(obj => { obj.casualty.sort((a,b)=>a-b); obj.surgery.sort((a,b)=>a-b); });

// Night duty lookup: date -> sorted list of all serials on any night posting
const NIGHT_POOL = {};
Object.entries(SCHEDULE).forEach(([serial, entries]) => {
  entries.forEach(([date, dept]) => {
    if (!dept) return;
    if (dept.includes('Night') || dept === 'Casualty Night') {
      if (!NIGHT_POOL[date]) NIGHT_POOL[date] = [];
      NIGHT_POOL[date].push(Number(serial));
    }
  });
});
Object.values(NIGHT_POOL).forEach(arr => arr.sort((a,b) => a-b));

function parseDate(str) {
  const [d,m,y] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

// Convert HTML date input value (YYYY-MM-DD) to our format (DD-MM-YYYY)
function htmlDateToOurs(val) {
  if (!val) return null;
  const [y,m,d] = val.split('-');
  return d + '-' + m + '-' + y;
}

function needsScrubs(dept) {
  if (!dept) return false;
  return dept.includes('ICU') || dept.includes('LR');
}

function getDeptType(dept) {
  if (dept.includes('Night')) return 'Night Shift';
  if (dept.includes('OPD')) return 'Outpatient';
  if (dept.includes('Ward') || dept.includes('ICU') || dept.includes('HPU')) return 'Ward / ICU';
  if (dept.includes('OT')) return 'Operation Theatre';
  if (dept.includes('LR')) return 'Labour Room';
  if (dept.includes('Casualty')) return 'Casualty';
  return 'Department';
}

function buildCard(date, dept, isToday, extraClass, cointerns, cabpool, partnerInterns) {
  const d = parseDate(date);
  const weekday = WEEKDAYS[d.getDay()];
  const dayNum = String(d.getDate()).padStart(2,'0');
  const isHoliday = dept === null;
  const scrubs = !isHoliday && needsScrubs(dept);
  const todayBadge = isToday ? '<span class="today-badge">TODAY</span>' : '';

  let deptContent;
  if (isHoliday) {
    deptContent = '<div class="holiday-text">Holiday / FMT / Periphery</div>';
  } else {
    const type = getDeptType(dept);
    deptContent = '<div class="dept-name">' + dept + '</div><div class="dept-type">' + type + '</div>';
  }

  let scrubsHtml = '';
  if (scrubs) {
    scrubsHtml = '<div class="scrubs-reminder"><span class="scrubs-icon">🩺</span> Reminder: Get your scrubs before this posting!</div>';
  }

  let cointernHtml = '';
  const hasCoInterns = !isHoliday && cointerns && cointerns.length > 0;
  const hasPartners = !isHoliday && partnerInterns && partnerInterns.length > 0;
  if (hasCoInterns || hasPartners) {
    const coItems = (cointerns || []).map(s => s + ': ' + (NAMES[s] || s));
    const partnerLabel = dept === 'Casualty Night' ? 'Surgery Intern' : 'Casualty Intern';
    const partnerItems = (partnerInterns || []).map(s => '<span class="partner-tag">' + s + ': ' + (NAMES[s] || s) + '</span>');
    const allItems = coItems.concat(partnerItems);
    const legend = hasPartners ? '<div class="cointerns-legend">' + partnerLabel + '</div>' : '';
    cointernHtml = '<div class="cointerns"><div class="cointerns-label">Co-interns</div>' + allItems.join(', ') + legend + '</div>';
  }

  const isNight = !isHoliday && dept && (dept.includes('Night') || dept === 'Casualty Night');
  let cabpoolHtml = '';
  if (isNight && cabpool && cabpool.length > 0) {
    cabpoolHtml = '<div class="cabpool"><div class="cabpool-label">🚕 Can pool cab with</div>' + cabpool.map(s => s + ': ' + (NAMES[s] || s)).join(', ') + '</div>';
  }

  const classes = ['day-card', isToday ? 'today' : '', isHoliday ? 'holiday' : '', extraClass || ''].filter(Boolean).join(' ');

  return '<div class="' + classes + '">' +
    '<div class="day-card-main">' +
      '<div class="date-block"><div class="date-day">' + dayNum + '</div><div class="date-weekday">' + weekday + '</div></div>' +
      '<div class="divider"></div>' +
      '<div class="dept-info">' + deptContent + '</div>' +
      todayBadge +
    '</div>' +
    scrubsHtml +
    cointernHtml +
    cabpoolHtml +
    '</div>';
}

let currentFilter = 'all';
let currentData = null;
let currentSerial = null;
let showPast = false;

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (currentData) renderCards(currentData);
  updateSingleDay();
}

function clearDate() {
  document.getElementById('dateInput').value = '';
  document.getElementById('singleDayResult').className = 'single-day-result';
  document.getElementById('singleDayResult').innerHTML = '';
  if (currentData) renderCards(currentData);
}

function updateSingleDay() {
  const dateVal = document.getElementById('dateInput').value;
  const sdr = document.getElementById('singleDayResult');
  if (!dateVal || !currentData) {
    sdr.className = 'single-day-result';
    sdr.innerHTML = '';
    if (currentData) renderCards(currentData);
    return;
  }
  const targetDate = htmlDateToOurs(dateVal);
  const entry = currentData.find(e => e[0] === targetDate);
  if (!entry) {
    sdr.className = 'single-day-result visible';
    sdr.innerHTML = '<div class="single-day-label">Result for ' + targetDate + '</div>' +
      '<div class="empty-state" style="padding:30px 0"><p>This date is outside the schedule range.</p></div>';
    document.getElementById('results').className = '';
    return;
  }
  const today = todayStr();
  const coKey = entry[1] ? entry[0] + '|' + entry[1] : null;
  const coList = coKey ? (CO_INTERNS[coKey] || []).filter(s => s !== currentSerial) : [];
  const nightPool = (NIGHT_POOL[entry[0]] || []).filter(s => s !== currentSerial);
  const isThisNight = entry[1] && (entry[1].includes('Night') || entry[1] === 'Casualty Night');
  const cabList = isThisNight ? nightPool.filter(s => !coList.includes(s)) : [];
  const partnerList = getPartnerInterns(entry[0], entry[1], currentSerial);
  const card = buildCard(entry[0], entry[1], entry[0] === today, '', coList, cabList, partnerList);
  sdr.className = 'single-day-result visible';
  sdr.innerHTML = '<div class="single-day-label">Result for ' + targetDate + '</div>' + card;
  // Hide full schedule when showing single day
  document.getElementById('results').className = '';
}


function getPartnerInterns(date, dept, selfSerial) {
  if (!dept) return [];
  const cross = CROSS_NIGHT[date];
  if (!cross) return [];
  if (dept === 'Casualty Night') return cross.surgery.filter(s => s !== selfSerial);
  if (dept === 'Surgery (Night)') return cross.casualty.filter(s => s !== selfSerial);
  return [];
}
function toggleHistory() {
  showPast = !showPast;
  const btn = document.getElementById('historyBtn');
  btn.textContent = showPast ? 'Hide Past' : 'Show Past';
  btn.classList.toggle('active', showPast);
  if (currentSerial) {
    const dateVal = document.getElementById('dateInput').value;
    if (!dateVal) renderCards(currentData);
  }
}

function lookupSerial() {
  const val = document.getElementById('serialInput').value.trim();
  const serial = parseInt(val);
  if (!val || isNaN(serial) || serial < 1 || serial > 58) {
    showError('Please enter a valid serial number between 1 and 58.');
    return;
  }
  const data = SCHEDULE[String(serial)];
  if (!data || data.length === 0) {
    showError('No schedule found for serial ' + serial + '.');
    return;
  }
  currentData = data;
  currentSerial = serial;
  currentFilter = 'all';
  showPast = false;
  const hBtn = document.getElementById('historyBtn');
  if (hBtn) { hBtn.textContent = 'Show Past'; hBtn.classList.remove('active'); }
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.filter-btn')[0].classList.add('active');

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('filters').style.display = 'flex';

  // Check if date is selected — show single day or full schedule
  const dateVal = document.getElementById('dateInput').value;
  if (dateVal) {
    updateSingleDay();
  } else {
    renderCards(data);
  }
}

function showError(msg) {
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('filters').style.display = 'none';
  document.getElementById('singleDayResult').className = 'single-day-result';
  const r = document.getElementById('results');
  r.className = 'visible';
  r.innerHTML = '<div class="empty-state"><div class="big-num">?</div><p>' + msg + '</p></div>';
}

function renderCards(data) {
  const today = todayStr();
  const r = document.getElementById('results');
  r.className = 'visible';

  const months = {};
  const todayDate = parseDate(todayStr());
  const filteredData = showPast ? data : data.filter(([date]) => parseDate(date) >= todayDate);

  filteredData.forEach(([date, dept]) => {
    const d = parseDate(date);
    const key = MONTHS[d.getMonth()] + ' ' + d.getFullYear();
    if (!months[key]) months[key] = [];
    months[key].push([date, dept, d]);
  });

  const internName = currentSerial + ': ' + (NAMES[currentSerial] || ('Serial ' + currentSerial));
  let html = '<div class="intern-name-header">' + internName + '</div>';
  Object.entries(months).forEach(([monthKey, days]) => {
    let cardsHtml = '';
    let visibleCount = 0;

    days.forEach(([date, dept, d]) => {
      const isToday = date === today;
      const isHoliday = dept === null;
      let hidden = false;
      if (currentFilter === 'duty' && isHoliday) hidden = true;
      if (currentFilter === 'holiday' && !isHoliday) hidden = true;
      if (!hidden) visibleCount++;
      const coKey2 = dept ? date + '|' + dept : null;
      const coList2 = coKey2 ? (CO_INTERNS[coKey2] || []).filter(s => s !== currentSerial) : [];
      const nightPool2 = (NIGHT_POOL[date] || []).filter(s => s !== currentSerial);
      const isThisNight2 = dept && (dept.includes('Night') || dept === 'Casualty Night');
      const cabList2 = isThisNight2 ? nightPool2.filter(s => !coList2.includes(s)) : [];
      const partnerList2 = getPartnerInterns(date, dept, currentSerial);
      const card = buildCard(date, dept, isToday, hidden ? 'hidden' : '', coList2, cabList2, partnerList2);
      cardsHtml += card;
    });

    if (visibleCount > 0) {
      html += '<div class="month-group">' +
        '<div class="month-label">' + monthKey + '</div>' +
        '<div class="day-grid">' + cardsHtml + '</div></div>';
    }
  });

  if (!html) {
    html = '<div class="empty-state"><div class="big-num">—</div><p>No entries match this filter.</p></div>';
  }
  r.innerHTML = html;
}

// Wire up events
document.getElementById('serialInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') lookupSerial();
});
document.getElementById('dateInput').addEventListener('change', function() {
  if (currentData) updateSingleDay();
});
